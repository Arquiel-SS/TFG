<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Registro - Catálogo</title>
</head>
<body>
    <h2>Registro</h2>

    <form id="registerForm">
        <label>Usuario: <input type="text" id="username" required></label><br>
        <label>Email: <input type="email" id="email" required></label><br>
        <label>Contraseña: <input type="password" id="password" required></label><br>
        <button type="submit">Registrarse</button>
    </form>

    <p>¿Ya tienes cuenta? <a href="/login.html">Inicia sesión aquí</a></p>

    <div id="error" style="color:red;"></div>
    <div id="success" style="color:green;"></div>

    <script>
        const form = document.getElementById('registerForm');
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    successDiv.textContent = "Usuario registrado correctamente. Redirigiendo...";
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 1500);
                } else {
                    errorDiv.textContent = data.error || "Error en el registro";
                }

            } catch (err) {
                errorDiv.textContent = "Error de conexión";
                console.error(err);
            }
        });
    </script>
</body>
</html>
