<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Catálogo de Videojuegos</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <h2>Crear Cuenta</h2>

        <form id="registerForm">
            <div class="form-group">
                <label>
                    <span>Usuario</span>
                    <input type="text" id="username" placeholder="tu_usuario" required>
                </label>
            </div>

            <div class="form-group">
                <label>
                    <span>Email</span>
                    <input type="email" id="email" placeholder="tu@email.com" required>
                </label>
            </div>

            <div class="form-group">
                <label>
                    <span>Contraseña</span>
                    <input type="password" id="password" placeholder="••••••••" required>
                </label>
            </div>

            <button type="submit">Registrarse</button>
        </form>

        <div id="error"></div>
        <div id="success"></div>
        
        <p>¿Ya tienes cuenta? <a href="/login.html">Inicia sesión aquí</a></p>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    successDiv.textContent = "Usuario registrado correctamente. Redirigiendo...";
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 1500);
                } else {
                    errorDiv.textContent = data.error || "Error en el registro";
                }

            } catch (err) {
                errorDiv.textContent = "Error de conexión";
                console.error(err);
            }
        });
    </script>
</body>
</html>
