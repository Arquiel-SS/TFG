<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Login - Catálogo de Videojuegos</title>
</head>
<body>
    <h2>Login</h2>
    <form id="loginForm">
        <label>Usuario: <input type="text" id="username" required></label><br>
        <label>Contraseña: <input type="password" id="password" required></label><br>
        <button type="submit">Entrar</button>
    </form>
    <div id="error" style="color:red;"></div>

    <script>
        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('error');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    // Guardamos el token en localStorage
                    localStorage.setItem('token', data.token);
                    // Redirigimos al dashboard
                    window.location.href = '/dashboard.html';
                } else {
                    errorDiv.textContent = data.error || 'Usuario o contraseña incorrectos';
                }
            } catch (err) {
                errorDiv.textContent = 'Error de conexión al servidor';
                console.error(err);
            }
        });
    </script>
</body>
</html>
