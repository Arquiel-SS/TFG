<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Videojuegos</title>
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

<!-- ================= NAVBAR FIJA ================= -->
<nav class="navbar">
    <div class="nav-center">

        <!-- Selector vista catálogo / favoritos -->
        <select id="selectorVistaCat">
            <option value="todos">Ver todos</option>
            <option value="favoritos">Mis favoritos</option>
        </select>

        <select id="selectorGenero">
            <option value="">Todos los géneros</option>
        </select>
    </div>

    <div class="nav-right">
        <input type="text" id="barraBusqueda" placeholder="Buscar juego...">

        <!-- Perfil usuario -->
        <div class="perfil-container" id="perfilContainer">
            <img src="https://via.placeholder.com/40" alt="Avatar" id="avatarUsuario" class="avatar">
            <div class="perfil-menu hidden" id="perfilMenu">
                <p id="usernameMenu">Usuario</p>
                <button id="cerrarSesion">Cerrar sesión</button>
            </div>
        </div>
    </div>
</nav>

<!-- ================= HEADER ================= -->
<header class="mainHeader">
    <h1>CATÁLOGO DE VIDEOJUEGOS</h1>
</header>

<!-- ================= CONTENEDOR PADRE DINÁMICO ================= -->
<section id="contentWrapper">

    <!-- VISTA CATÁLOGO -->
    <section id="vistaCatalogo">
        <h2 id="tituloSeccion">Buscar Juegos</h2>
        <div id="catalogoCarrusel" class="carrusel"></div>
    </section>

    <!-- VISTA JUEGO ACTIVO -->
    <section id="vistaJuego" class="hidden">

        <!-- Tabs internas -->
        <div class="gameTabs">
            <button id="subTabInfo" class="gameTab active">Información</button>
            <button id="subTabForo" class="gameTab">Foro</button>
        </div>

        <div id="gameContent">

            <!-- ---------------- INFO JUEGO ---------------- -->
            <section id="gameInfo"></section>

            <!-- ---------------- FORO ---------------- -->
            <section id="gameForo" class="hidden">

                <!-- Vista lista de hilos -->
                <div id="foroLista">
                    <div class="foroHeader">
                        <h3>Foro del juego</h3>
                        <button id="crearHiloBtn">+ Nuevo hilo</button>
                    </div>
                    <div id="listaHilos"></div>
                </div>

                <!-- Vista crear hilo -->
                <div id="foroCrear" class="hidden">
                    <h3>Crear nuevo hilo</h3>
                    <input type="text" id="tituloHilo" placeholder="Título del hilo">
                    <textarea id="contenidoHilo" placeholder="Escribe tu mensaje inicial..."></textarea>
                    <button id="guardarHilo">Publicar</button>
                    <button id="cancelarHilo">Cancelar</button>
                </div>

                <!-- Vista hilo individual -->
                <div id="foroDetalle" class="hidden">
                    <button id="volverLista">← Volver a hilos</button>
                    <h3 id="detalleTitulo"></h3>
                    <div id="detalleMensajes"></div>

                    <textarea id="respuestaMensaje" placeholder="Escribe una respuesta..."></textarea>
                    <button id="enviarRespuesta">Responder</button>
                </div>

            </section>

        </div>

        <button id="volverCatalogo" class="volverBtn">← Volver al catálogo</button>
    </section>

</section>

<script src="js/dashboard.js" defer></script>
</body>
</html>
