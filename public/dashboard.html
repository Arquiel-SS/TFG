<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Dashboard - Catálogo de Videojuegos</title>
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <button class="nav-option active">Buscar juegos</button>
            <button class="nav-option">Juegos favoritos</button>
        </div>

        <div class="nav-right">
            <div id="searchBar">
                <input type="text" placeholder="Buscar...">
                <button id="submitSearch">Buscar</button>
            </div>
            <button id="logout">Cerrar sesión</button>
        </div>
    </nav>

    <header class="header">
        <h1>Catálogo de Videojuegos</h1>
    </header>

    <main>
        <section id="containerContenido">

            <div class="bloque">
                <h2>Títulos mejor valorados</h2>
                <ul id="highRatedGames" class="game-list"></ul>
            </div>

            <div class="bloque">
                <h2>Otras sugerencias</h2>
                <ul id="otherSuggestionsGames" class="game-list"></ul>
            </div>

        </section>
        <div id="juegos"></div>
    </main>

<script src="/js/dashboard.js"></script>

</body>
</html>
